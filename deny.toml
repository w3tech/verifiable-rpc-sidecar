# cargo-deny configuration — dependency license compatibility gate.
#
# This project is licensed AGPL-3.0-only. Every dependency must carry a license
# that is compatible with redistributing the combined work under AGPL-3.0.
# The allow-list below is derived from the actual license expressions of the
# current dependency tree (`cargo metadata`); all are OSI-permissive or
# GPL-compatible weak-copyleft (MPL-2.0). CI runs `cargo deny check licenses`.

[licenses]
version = 2
confidence-threshold = 0.8

# Skip the unpublishable workspace crate itself (publish = false) — its own
# AGPL-3.0-only license is not subject to this dependency allow-list.
private = { ignore = true }

# Dependency licenses (the workspace crate is skipped via private.ignore above).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-1-Clause",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "MIT-0",
    "BSL-1.0",
    "MPL-2.0",            # weak (file-level) copyleft, GPL/AGPL-compatible
    "CDLA-Permissive-2.0",
]
