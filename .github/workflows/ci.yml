name: CI

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Production image is built first. Cook stage (heavy dep compile) lands in
  # the GHA cache. Smoke-tests the binary boots and accepts --help. This is
  # the gate for downstream lint/test jobs.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: false
          load: true
          tags: rpc-attest-sidecar:ci
          cache-from: type=gha,scope=rpc-attest-sidecar
          cache-to: type=gha,mode=max,scope=rpc-attest-sidecar
      - name: Smoke test --help
        run: docker run --rm rpc-attest-sidecar:ci --help

  # Lint runs cargo fmt + cargo clippy inside a container built off the same
  # cook layer as build. Pulls cook + sources from GHA cache — cold layers
  # never re-materialise here.
  lint:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Run cargo fmt + clippy
        uses: docker/build-push-action@v6
        with:
          context: .
          target: lint
          push: false
          cache-from: type=gha,scope=rpc-attest-sidecar
          # No cache-to — lint stage adds nothing that downstream needs.

  # Tests run cargo test --lib inside a container built off the same cook
  # layer. Dev-deps were baked into cook via `cargo chef cook --tests` so the
  # test stage only compiles user code + runs binaries.
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Run cargo test --lib
        uses: docker/build-push-action@v6
        with:
          context: .
          target: test
          push: false
          cache-from: type=gha,scope=rpc-attest-sidecar
