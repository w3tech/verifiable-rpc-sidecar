name: CI

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint-test
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --lib

  license:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check SPDX license headers (src)
        run: |
          missing=$(find src -name '*.rs' -exec grep -L 'SPDX-License-Identifier: AGPL-3.0-only' {} +)
          if [ -n "$missing" ]; then
            echo "::error::Source files missing the SPDX AGPL-3.0-only header:"
            echo "$missing"
            exit 1
          fi
          echo "All src/*.rs carry the SPDX AGPL-3.0-only header."
      - name: cargo-deny (dependency license compatibility)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses
