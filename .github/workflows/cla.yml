# CLA Assistant — requires contributors to sign the CLA (CLA.md) before merge.
#
# DORMANT BY DESIGN: the job only runs when the repository variable
# `CLA_ENABLED` is set to "true". Keep it OFF until legal has approved CLA.md
# (LIC-06) and the repo is ready to accept external contributions. Activate via:
#   Settings → Secrets and variables → Actions → Variables → CLA_ENABLED = true
#
# Signatures are stored in a dedicated `cla-signatures` branch of this repo.
name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    if: ${{ vars.CLA_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/w3tech/verifiable-rpc-sidecar/blob/main/CLA.md'
          branch: 'cla-signatures'
          allowlist: '*[bot]'
          custom-pr-sign-comment: 'I have read the CLA document and I hereby sign the CLA'
          custom-notsigned-prcomment: 'Please sign the Contributor License Agreement (CLA.md) before this PR can be merged.'
