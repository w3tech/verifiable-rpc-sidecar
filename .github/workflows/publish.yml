name: publish

# Build and push the production image to the AWS ECR registry on every
# v*.*.* git tag. Pattern adopted from shark-proxy.
#
# Auth: GitHub OIDC assuming arn:aws:iam::371241243018:role/ECRPushRole
# (no long-lived AWS keys). The publish-image job declares
# permissions: id-token: write for OIDC token issuance.

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish-image:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::371241243018:role/ECRPushRole
          aws-region: us-west-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/w3tech/images/verifiable-rpc-sidecar:${{ github.ref_name }}
            ${{ steps.login-ecr.outputs.registry }}/w3tech/images/verifiable-rpc-sidecar:latest
          cache-from: type=gha,scope=rpc-attest-sidecar
          cache-to: type=gha,mode=max,scope=rpc-attest-sidecar
